appId: com.hermesai.desktop
productName: HermesAI

directories:
  output: release
  buildResources: build

# Only the Electron shell goes into app.asar. The three runtimes (backend,
# frontend, fastclaw) and the bundled Node live in extraResources so their
# native binaries and on-disk file layout survive packaging intact.
files:
  - electron/**/*
  - package.json

asar: true

extraResources:
  - from: resources-staged/node
    to: node
    filter: ["**/*"]
  - from: resources-staged/backend
    to: backend
    filter: ["**/*"]
  - from: resources-staged/frontend
    to: frontend
    filter: ["**/*"]
  - from: resources-staged/fastclaw
    to: fastclaw
    filter: ["**/*"]
  - from: resources-staged/fastclaw-seed
    to: fastclaw-seed
    filter: ["**/*"]

win:
  target:
    - target: nsis
      arch:
        - x64
  # icon omitted — electron-builder falls back to the default Electron icon.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: HermesAI
  uninstallDisplayName: HermesAI

# Skip code signing for the v0.1 engineering loop.
forceCodeSigning: false
