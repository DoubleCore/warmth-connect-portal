# SSH 服务器配置示例
# 复制为 config.yaml 并填入真实信息：
#   copy config.example.yaml config.yaml
# config.yaml 已在 .gitignore 中，不会被提交

# 默认使用的服务器别名 (可选；省略则使用第一个)
defaultServer: dev

# 全局连接超时 (毫秒)
timeoutMs: 10000

# 服务器列表，键为别名（npm run ssh -- -s <别名>）
servers:
  # 开发服务器 - 密码登录
  dev:
    host: 192.168.1.200
    port: 22
    username: dev
    password: dev-password

  # 生产服务器 - 密钥登录 (推荐)
  production:
    host: 192.168.1.100
    port: 22
    username: deploy
    keyFile: ~/.ssh/id_rsa
    # keyPassphrase: 私钥密码 (如有)

  # 跳板机
  bastion:
    host: jump.example.com
    port: 22
    username: admin
    keyFile: ~/.ssh/id_rsa
